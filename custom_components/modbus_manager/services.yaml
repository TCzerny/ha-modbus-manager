# Modbus Manager Services
performance_monitor:
  name: "Performance Monitor"
  description: "Get performance metrics for Modbus Manager devices"
  fields:
    device_id:
      name: "Device ID"
      description: "The device ID to get metrics for (optional, if not provided returns global metrics)"
      required: false
      selector:
        text:

performance_reset:
  name: "Performance Reset"
  description: "Reset performance metrics for Modbus Manager devices"
  fields:
    device_id:
      name: "Device ID"
      description: "The device ID to reset metrics for (optional, if not provided resets global metrics)"
      required: false
      selector:
        text:

add_entity_prefix:
  name: "Add Entity Prefix"
  description: "Add device prefix to entity_ids (after migration from unprefixed entity_ids)"
  fields:
    entry_id:
      name: "Config Entry ID"
      description: "The Modbus Manager config entry ID (required)"
      required: true
      selector:
        config_entry:
          integration: modbus_manager
    device_entry_id:
      name: "Device Entry ID"
      description: "Device subentry unique_id (optional, for multi-device hubs)"
      required: false
      selector:
        text:




reload_templates:
  name: "Reload Templates"
  description: "Reload device templates and update entity attributes without restart"
  fields:
    entry_id:
      name: "Config Entry ID"
      description: "The config entry ID to reload templates for (optional, if not provided reloads all entries)"
      required: false
      selector:
        text:

read_device_identification:
  name: "Read Device Identification (FC43)"
  description: "Connect to a Modbus device (TCP, RTU over TCP, or serial RTU), read FC43 (0x2B) identification strings, and show the result in a notification"
  fields:
    connection_type:
      name: "Connection type"
      description: "Transport for the probe (default tcp)"
      required: false
      default: tcp
      selector:
        select:
          options:
            - tcp
            - serial
            - rtuovertcp
    host:
      name: "Host"
      description: "IP address or hostname (required for tcp and rtuovertcp)"
      required: false
      selector:
        text:
    port:
      name: "Port"
      description: "Modbus TCP port for tcp/rtuovertcp (default 502)"
      required: false
      default: 502
      selector:
        number:
          min: 1
          max: 65535
          mode: box
    serial_port:
      name: "Serial port"
      description: "Serial device path for RTU (required for serial, e.g. /dev/ttyUSB0)"
      required: false
      selector:
        text:
    baudrate:
      name: "Baudrate"
      description: "Serial baudrate for RTU (default 9600)"
      required: false
      default: 9600
      selector:
        select:
          options:
            - "9600"
            - "19200"
            - "38400"
            - "57600"
            - "115200"
    data_bits:
      name: "Data bits"
      description: "Serial data bits for RTU (default 8)"
      required: false
      default: 8
      selector:
        select:
          options:
            - "7"
            - "8"
    stop_bits:
      name: "Stop bits"
      description: "Serial stop bits for RTU (default 1)"
      required: false
      default: 1
      selector:
        select:
          options:
            - "1"
            - "2"
    parity:
      name: "Parity"
      description: "Serial parity for RTU (default none)"
      required: false
      default: none
      selector:
        select:
          options:
            - none
            - even
            - odd
    slave_id:
      name: "Slave ID"
      description: "Modbus slave/unit ID to query (default 1)"
      required: false
      selector:
        number:
          min: 1
          max: 247
          mode: box
    read_code:
      name: "Read code"
      description: "Identification category (basic, regular, or extended)"
      required: false
      default: basic
      selector:
        select:
          options:
            - basic
            - regular
            - extended
    timeout:
      name: "Timeout"
      description: "Connection and read timeout in seconds (default 3)"
      required: false
      selector:
        number:
          min: 1
          max: 30
          mode: box
    message_wait_milliseconds:
      name: "Message wait"
      description: "Inter-frame delay in milliseconds for RTU/serial (default 100, try 100-300 for slow devices)"
      required: false
      default: 100
      selector:
        number:
          min: 10
          max: 1000
          mode: box
    notify:
      name: "Show notification"
      description: "Create a persistent notification with the result text"
      required: false
      default: true
      selector:
        boolean:
