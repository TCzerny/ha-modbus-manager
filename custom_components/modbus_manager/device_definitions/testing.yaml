# Test Device Definition
device_info:
  name: "Test Device"
  manufacturer: "ModbusManager"
  model: "Test"
  description: "Testgerät für die Entwicklung"

registers:
  read:
    # Test der Register 4950-4970 als Holding Register
    - { name: "holding_4950", address: 4950, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4951", address: 4951, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4952", address: 4952, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4953", address: 4953, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4954", address: 4954, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4968", address: 4968, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4969", address: 4969, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "holding_4970", address: 4970, type: "uint16", scale: 1, precision: 0, register_type: "holding" }

    # Test der Register 4950-4970 als Input Register
    - { name: "input_4950", address: 4950, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4951", address: 4951, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4952", address: 4952, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4953", address: 4953, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4954", address: 4954, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4968", address: 4968, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4969", address: 4969, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "input_4970", address: 4970, type: "uint16", scale: 1, precision: 0, register_type: "input" }

    # Test der Register als zusammenhängender Block
    - { name: "holding_block", address: 4950, type: "string", count: 5, register_type: "holding" }
    - { name: "input_block", address: 4950, type: "string", count: 5, register_type: "input" }

  write:
    - { name: "inverter_start_stop", 
        address: 12999, 
        type: "uint16", 
        min: 0, 
        max: 5,
        options: {
          0: "Stop",
          1: "Start",
          2: "Debug Mode",
          3: "Standby",
          4: "Emergency Stop",
          5: "Reset"
        }
      }

polling:
  fast:
    interval: 5
    registers: [
      "holding_4950",
      "holding_4951",
      "holding_4952",
      "holding_4953",
      "holding_4954",
      "holding_4968",
      "holding_4969",
      "holding_4970",
      "input_4950",
      "input_4951",
      "input_4952",
      "input_4953",
      "input_4954",
      "input_4968",
      "input_4969",
      "input_4970",
      "holding_block",
      "input_block",
      "inverter_start_stop"
    ]