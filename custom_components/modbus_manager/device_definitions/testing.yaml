# Sungrow SH-RT Hybrid Wechselrichter (3-Phasen mit Batterie)
# Basierend auf https://github.com/mkaiser/Sungrow-SHx-Inverter-Modbus-Home-Assistant

device_info:
  name: "Test Device"
  manufacturer: "ModbusManager"
  model: "Test"
  description: "Testgerät für die Entwicklung"

# Firmware-Konfiguration
firmware:
  version_register: 4954
  version_type: "uint16"
  auto_detect: true
  fallback_version: "1.0.0"

# Modbus-Konfiguration
modbus:
  slave_id: 1
  connection:
    timeout: 5
    retry_delay: 0.5
    max_retries: 3
    batch_size: 10

# Polling-Konfiguration
polling:
  fast:
    interval: 5
    registers: [
      # ARM Version (Holding)
      "arm_5800", "arm_5801", "arm_5802",
      
      # ARM Version (Input)
      "arm_i_5800", "arm_i_5801", "arm_i_5802",
      
      # MDSP Version (Holding)
      "mdsp_5815", "mdsp_5816", "mdsp_5817",
      
      # MDSP Version (Input)
      "mdsp_i_5815", "mdsp_i_5816", "mdsp_i_5817",
      
      # String Tests
      "arm_str", "arm_str_i",
      "mdsp_str", "mdsp_str_i",
      
      "inverter_start_stop"
    ]
  normal:
    interval: 30
    registers: ["running_state"]
  slow:
    interval: 600
    registers: []

firmware_versions:
  "1.0.0":  # Original Firmware
    registers:
      read:
        - { name: "running_state", address: 13000, type: "uint16", state_class: "measurement", translation_key: "sensor.running.state", scale: 1, precision: 0 }
        # ... weitere Register

  "1.0.23":  # Neue Firmware mit geänderten Registern
    registers:
      read:
        - { name: "battery_power", address: 13025, type: "int32" }
        # ... geänderte Register       
         
# Register-Definitionen
registers:
  read:
    # ARM Version einzeln
    - { name: "arm_5800", address: 5800, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "arm_5801", address: 5801, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "arm_5802", address: 5802, type: "uint16", scale: 1, precision: 0, register_type: "holding" }

    # ARM Version als Input Register
    - { name: "arm_i_5800", address: 5800, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "arm_i_5801", address: 5801, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "arm_i_5802", address: 5802, type: "uint16", scale: 1, precision: 0, register_type: "input" }

    # MDSP Version einzeln
    - { name: "mdsp_5815", address: 5815, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "mdsp_5816", address: 5816, type: "uint16", scale: 1, precision: 0, register_type: "holding" }
    - { name: "mdsp_5817", address: 5817, type: "uint16", scale: 1, precision: 0, register_type: "holding" }

    # MDSP Version als Input Register
    - { name: "mdsp_i_5815", address: 5815, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "mdsp_i_5816", address: 5816, type: "uint16", scale: 1, precision: 0, register_type: "input" }
    - { name: "mdsp_i_5817", address: 5817, type: "uint16", scale: 1, precision: 0, register_type: "input" }

    # Kleine String-Tests
    - { name: "arm_str", address: 5800, type: "string", count: 3, register_type: "holding", description: "ARM Version String (Holding)" }
    - { name: "arm_str_i", address: 5800, type: "string", count: 3, register_type: "input", description: "ARM Version String (Input)" }
    - { name: "mdsp_str", address: 5815, type: "string", count: 3, register_type: "holding", description: "MDSP Version String (Holding)" }
    - { name: "mdsp_str_i", address: 5815, type: "string", count: 3, register_type: "input", description: "MDSP Version String (Input)" }

  write:
    - { name: "inverter_start_stop", 
        address: 12999, 
        type: "uint16", 
        min: 0, 
        max: 5,
        options: {
          0: "Stop",
          1: "Start",
          2: "Debug Mode",
          3: "Standby",
          4: "Emergency Stop",
          5: "Reset"
        }
      }

