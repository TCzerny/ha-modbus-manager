views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Momentanleistung
            heading_style: title
          - type: custom:power-flow-card-plus
            kw_decimals: 2
            entities:
              grid:
                entity:
                  consumption: sensor.{PREFIX}_import_power
                  production: sensor.{PREFIX}_export_power
                color_circle: true
                secondary_info: {}
              solar:
                entity: sensor.{PREFIX}_total_dc_power
                secondary_info: {}
              battery:
                entity:
                  consumption: sensor.{PREFIX}_battery_discharging_power
                  production: sensor.{PREFIX}_battery_charging_power
                state_of_charge: sensor.{PREFIX}_battery_level
                color_circle: true
              home:
                color_icon: true
                entity: sensor.{PREFIX}_real_load_power
            watt_threshold: 1000
            display_zero_lines:
              mode: grey_out
              transparency: 50
              grey_color:
                - 189
                - 189
                - 189
            clickable_entities: true
            use_new_flow_rate_model: true
            w_decimals: 0
