services:
  homeassistant:
    container_name: homeassistant-dev
    # Use 'latest' for newest stable release; 'dev' for bleeding-edge
    image: ghcr.io/home-assistant/home-assistant:latest
    volumes:
      # Docker socket for dev tasks (restart HA, etc.)
      - /var/run/docker.sock:/var/run/docker.sock
      # HA Config
      - ./config:/config
      # Custom Components mounten für Development
      - ./custom_components/modbus_manager:/config/custom_components/modbus_manager
      # Workspace für DevContainer
      - .:/workspace
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped
    ports:
      - "8123:8123"
    privileged: true
